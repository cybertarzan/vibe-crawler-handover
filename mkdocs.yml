site_name: Vibe Crawling Platform - 인수인계 문서
site_description: Vibe Crawling Platform 백엔드/프론트엔드 인수인계 문서
site_url: https://angalle.github.io/vibe-crawler-handover/
repo_url: https://github.com/angalle/vibe-crawler-handover

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Backend:
    - 프로젝트 개요: backend/01-project-overview.md
    - 아키텍처 및 설계: backend/02-architecture-and-design.md
    - 운영 가이드:
      - 개요: backend/operations/index.md
      - 빌드 및 배포: backend/operations/01-build-deploy.md
      - 모니터링 및 로그: backend/operations/02-monitoring-logs.md
      - 외부 서비스 연동: backend/operations/03-external-services.md
      - DB 관리: backend/operations/04-db-management.md
      - 스토리지 용량 계획: backend/operations/05-storage-planning.md
    - 이슈 및 히스토리: backend/04-issues-and-history.md
  - Frontend:
    - 프로젝트 개요: frontend/01-project-overview.md
    - 아키텍처 및 설계: frontend/02-architecture-and-design.md
    - 운영 가이드: frontend/03-operations-guide.md
    - 이슈 및 히스토리: frontend/04-issues-and-history.md
  - 계획서:
    - 크롤링 서버 증량:
      - 개요: plans/server-scaling/index.md
      - 방안 A - Scale-Up: plans/server-scaling/01-scale-up.md
      - 방안 B - Worker 분리 (권장): plans/server-scaling/02-worker-separation.md
      - 방안 C - 멀티 Master: plans/server-scaling/03-multi-master.md
      - AWS 인프라 및 실행 계획: plans/server-scaling/04-infra-and-plan.md
  - 이슈:
    - BUG-002 PID 저장실패 / 좀비세션: issues/bug-002-pid-zombie.md
    - 로그 자동 정리 검증: issues/log-cleanup-checklist.md
    - 운영서버 스토리지 분석: issues/storage-analysis.md
    - 좀비 컨테이너 및 디스크 관리: issues/zombie-container-disk.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
